name: Deploy Pages

# Publish the foundry component gallery to GitHub Pages after CI passes on main.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-flight deploy; let it finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    # Manual runs always build; workflow_run only when CI succeeded, so a red
    # CI run never publishes.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run checks out the branch tip by default; pin the exact
          # commit CI validated. Falls back to the ref for manual dispatch.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The project site lives under /another-graphql-ide/, so asset URLs need
      # that base. Dev and local builds stay at the root (PAGES_BASE unset).
      - run: pnpm --filter foundry build
        env:
          PAGES_BASE: /another-graphql-ide/

      # SPA deep-link fallback: Pages serves 404.html for unknown paths, so a
      # hard refresh on a nested route still loads the app.
      - run: cp apps/foundry/dist/index.html apps/foundry/dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/foundry/dist

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
